name: Playwright Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v4

    - name: git clone
      uses: actions/checkout@v4

    - name: Install dependencies
      run: | 
        pip install -r requirements.txt
        playwright install

    - name: Run tests
      run: pytest -vv --alluredir=allure-results

    - name: Install Allure Commandline
      if: always()
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget
        wget https://github.com/allure-framework/allure2/releases/download/2.13.8/allure-2.13.8.zip
        unzip allure-2.13.8.zip
        sudo mv allure-2.13.8 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

    - name: Generate Allure Report
      if: always()
      run: allure generate allure-results --clean -o allure-report

    - name: Upload Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages

   