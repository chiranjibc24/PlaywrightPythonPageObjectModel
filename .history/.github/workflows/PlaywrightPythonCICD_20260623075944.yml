name: Playwright Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v4

    - name: git clone
      uses: actions/checkout@v4

    - name: Install dependencies
      run: | 
        pip install -r requirements.txt
        playwright install

    - name: Run tests
      run: pytest -v --alluredir=Reports 
      
    - name: Install Allure Commandline
      if: always()
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget
        wget https://github.com/allure-framework/allure2/releases/download/2.13.8/allure-2.13.8.zip
        unzip allure-2.13.8.zip
        sudo mv allure-2.13.8 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

    - name: Generate Allure Report
      if: always()
      run: allure generate allure-results --clean -o allure-report

    - name: Upload GitHub Pages Artifact
      if: always()
      uses: actions/upload-pages-artifact@v4
      with:
        path: allure-report

  deploy:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

   